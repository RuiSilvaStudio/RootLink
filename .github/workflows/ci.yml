name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rootlink/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: rootlink/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install ruff
      - run: ruff check app scripts
      - run: python -m compileall app scripts
      - run: python -c "from app.main import app; print('App loaded OK')"

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: rootlink/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: rootlink/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
