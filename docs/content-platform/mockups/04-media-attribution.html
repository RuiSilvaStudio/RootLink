<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RootLink — Media Upload, License & Liability</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = { theme: { extend: {
  fontFamily: { display: ['Fraunces','serif'], serif: ['"Source Serif 4"','serif'] },
  colors: {
    earth:{50:'#f5f0ea',100:'#e8ddd0',200:'#d4c0a8',300:'#bba080',400:'#a6845e',500:'#8c6b48',600:'#70553a',700:'#5a432e',800:'#453324',900:'#2e2218'},
    rust:{50:'#f9f0ec',100:'#f0dcd1',200:'#e0bea8',300:'#cf9b7a',400:'#c07d53',500:'#a8643d',600:'#8b5032',700:'#714029',800:'#5c3422',900:'#4a2a1c'},
    cream:'#f8f6f2',
  }, borderRadius:{ xl2:'16px' },
}}}
</script>
<style>body{font-family:'Source Serif 4',serif}h1,h2,h3,.font-display{font-family:'Fraunces',serif}.font-sans{font-family:ui-sans-serif,system-ui,sans-serif}</style>
</head>
<body class="bg-earth-900/40 text-earth-900 min-h-screen grid place-items-center p-5" style="background-image:linear-gradient(135deg,#5a432e,#2e2218)">

<div class="w-full max-w-lg">
<div class="mb-3 text-center text-cream/80 text-xs font-sans">MOCKUP · §6.1 One pipeline · §6.2 License required + liability disclaimer · §6.3 EXIF stripped</div>

<!-- Modal -->
<div class="bg-cream rounded-xl2 shadow-2xl ring-1 ring-black/10 overflow-hidden">
  <div class="flex items-center justify-between px-5 py-4 border-b border-earth-100">
    <h2 class="font-display text-xl font-600 text-earth-800">Add image</h2>
    <button class="w-8 h-8 grid place-items-center rounded-full hover:bg-earth-100 text-earth-500"><i data-lucide="x" class="w-5 h-5"></i></button>
  </div>

  <div class="p-5 space-y-4">
    <!-- preview -->
    <div class="flex gap-3">
      <div class="w-28 h-28 rounded-xl2 bg-gradient-to-br from-emerald-200 via-earth-200 to-rust-200 ring-1 ring-earth-100 shrink-0 grid place-items-center text-earth-600">
        <i data-lucide="sprout" class="w-7 h-7"></i>
      </div>
      <div class="flex-1 min-w-0 font-sans">
        <p class="text-sm font-600 text-earth-800 truncate">garden-bed-2026.jpg</p>
        <p class="text-xs text-earth-500 mt-0.5">1.8 MB · 2400×1600 → optimized to WebP</p>
        <p class="text-xs text-emerald-700 mt-2 inline-flex items-center gap-1"><i data-lucide="check-circle-2" class="w-4 h-4"></i>Location metadata (EXIF/GPS) removed</p>
        <button class="mt-2 text-xs text-earth-600 underline">Replace</button>
      </div>
    </div>

    <!-- license -->
    <div>
      <label class="flex items-center gap-1.5 text-[13px] font-sans font-600 text-earth-700 mb-1.5">License
        <span class="w-4 h-4 grid place-items-center rounded-full bg-earth-100 text-earth-500" title="We need to know your rights to this image before it can go live."><i data-lucide="info" class="w-3 h-3"></i></span>
        <span class="text-rust-600">*</span>
      </label>
      <div class="relative">
        <select class="w-full appearance-none font-sans text-[15px] bg-white ring-1 ring-earth-200 rounded-xl2 px-3.5 py-2.5 text-earth-800 focus:ring-earth-500 outline-none">
          <option>My own work</option>
          <option>Creative Commons (CC-BY)</option>
          <option>Creative Commons (CC0 / Public domain)</option>
          <option>I have permission from the owner</option>
        </select>
        <i data-lucide="chevron-down" class="w-4 h-4 text-earth-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
      </div>
    </div>

    <!-- attribution + source -->
    <div class="grid grid-cols-2 gap-3 font-sans">
      <div>
        <label class="block text-[13px] font-600 text-earth-700 mb-1.5">Credit / author</label>
        <input class="w-full text-[15px] bg-white ring-1 ring-earth-200 rounded-xl2 px-3.5 py-2.5 text-earth-800 placeholder-earth-300 focus:ring-earth-500 outline-none" placeholder="e.g. Rui M." />
      </div>
      <div>
        <label class="block text-[13px] font-600 text-earth-700 mb-1.5">Source URL <span class="text-earth-400 font-400">(if external)</span></label>
        <input class="w-full text-[15px] bg-white ring-1 ring-earth-200 rounded-xl2 px-3.5 py-2.5 text-earth-800 placeholder-earth-300 focus:ring-earth-500 outline-none" placeholder="https://…" />
      </div>
    </div>

    <!-- liability disclaimer -->
    <label class="flex gap-3 items-start bg-rust-50 ring-1 ring-rust-200 rounded-xl2 p-3.5 cursor-pointer">
      <input type="checkbox" checked class="mt-0.5 w-5 h-5 accent-rust-600 shrink-0" />
      <span class="font-sans text-[13px] leading-relaxed text-earth-700">
        <span class="font-600 text-earth-800 flex items-center gap-1.5">I own or have the rights to this image
          <span class="w-4 h-4 grid place-items-center rounded-full bg-rust-100 text-rust-600" title="By confirming, you take full legal responsibility for this image. Misuse leads to removal and account ban.">
            <i data-lucide="info" class="w-3 h-3"></i></span>
        </span>
        and I accept full legal responsibility for it. Misuse results in removal of the content and a ban.
      </span>
    </label>

    <p class="text-[12px] text-earth-400 font-sans flex items-center gap-1.5"><i data-lucide="lock" class="w-3.5 h-3.5"></i>Stored once, de-duplicated, and served as optimized WebP from our EU servers.</p>
  </div>

  <div class="flex items-center justify-end gap-2 px-5 py-4 border-t border-earth-100 bg-white/40">
    <button class="font-sans text-sm text-earth-600 px-4 py-2 rounded-full hover:bg-earth-100">Cancel</button>
    <button class="font-sans text-sm font-600 bg-earth-700 text-cream px-5 py-2.5 rounded-full shadow-sm">Save image</button>
  </div>
</div>
</div>

<script>lucide.createIcons()</script>
</body>
</html>
