services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./rootlink.db
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      DB_TYPE: sqlite
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npx next dev -p 3001
